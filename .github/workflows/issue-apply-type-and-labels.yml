name: Apply issue type and labels

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const NO_RESPONSE = '_No response_';

            const extract = (heading) => {
              const re = new RegExp(`###\\s*${heading}\\s*\\n+([\\s\\S]*?)(?=\\n###|$)`);
              const m = body.match(re);
              return m ? m[1].trim() : '';
            };

            const typeName = extract('Type');
            if (typeName && typeName !== NO_RESPONSE) {
              const res = await github.graphql(`
                query($org: String!) {
                  organization(login: $org) {
                    issueTypes(first: 20) { nodes { id name } }
                  }
                }
              `, { org: context.repo.owner });
              const matched = res.organization.issueTypes.nodes.find(t => t.name === typeName);
              if (matched) {
                await github.graphql(`
                  mutation($issueId: ID!, $typeId: ID!) {
                    updateIssueIssueType(input: { issueId: $issueId, issueTypeId: $typeId }) {
                      issue { id }
                    }
                  }
                `, {
                  issueId: context.payload.issue.node_id,
                  typeId: matched.id,
                });
              } else {
                core.warning(`Issue type "${typeName}" not found in organization`);
              }
            }

            const labelsRaw = extract('ラベル');
            if (labelsRaw && labelsRaw !== NO_RESPONSE) {
              const labels = labelsRaw.split(',').map(s => s.trim()).filter(Boolean);
              if (labels.length) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels,
                });
              }
            }
